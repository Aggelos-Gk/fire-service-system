spring:
  config:
    import: optional:file:.env[.properties],optional:file:.env.local[.properties]

  datasource:
    url: ${SUPABASE_DB_JDBC_URL:}
    username: ${SUPABASE_DB_USER:postgres}
    password: ${SUPABASE_DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver

  h2:
    console:
      enabled: false

  sql:
    init:
      mode: never

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
