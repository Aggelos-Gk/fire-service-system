server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:file:./database/fireservice;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ''

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  sql:
    init:
      mode: always
      schema-locations: classpath:init_db.sql  # ? Changed this!
      data-locations: classpath:init_db.sql    # ? And this!
      continue-on-error: true