server:
  port: ${PORT:8080}

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}

spring:
  config:
    import: optional:file:.env[.properties],optional:file:.env.local[.properties]

  devtools:
    restart:
      enabled: false

  datasource:
    url: ${SUPABASE_DB_JDBC_URL:}
    username: ${SUPABASE_DB_USER:postgres}
    password: ${SUPABASE_DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      data-source-properties:
        # Required for Supabase pooler (PgBouncer transaction mode):
        # avoid server-side prepared statements that can break across pooled sessions.
        prepareThreshold: 0
        preferQueryMode: simple

  jpa:
    hibernate:
      ddl-auto: ${HIBERNATE_DDL_AUTO:validate}
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  sql:
    init:
      mode: never
